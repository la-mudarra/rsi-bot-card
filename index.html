<style>
  body {
    font-family: 'Arial', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: #12141c; /* لون الخلفية */
    color: white;
  }
  .card {
    background: #1e2530;
    padding: 20px;
    border-radius: 15px;
    width: 350px;
    text-align: center;
  }
  .data-row {
    display: flex;
    justify-content: space-between; /* توزيع متساوي للعناصر */
    align-items: center;
    padding: 10px 0;
    border-top: 1px solid #333;
  }
  .label { color: #888; font-size: 0.9em; }
  .value { font-weight: bold; color: #ffb703; font-size: 1.2em; }
</style>

<div class="card">
  <h2>مؤشر RSI اللحظي</h2>
  <div class="data-row">
    <span class="label">قيمة RSI</span>
    <span class="value" id="rsi-val">0</span>
  </div>
  <div class="data-row">
    <span class="label">آخر تحديث</span>
    <span class="value" id="time-val">00:00</span>
  </div>
</div>

<script>
  // كود بسيط لاستخراج البيانات من الرابط وعرضها
  const params = new URLSearchParams(window.location.search);
  document.getElementById('rsi-val').innerText = params.get('rsi');
  document.getElementById('time-val').innerText = params.get('time');
</script>
