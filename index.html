```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 800px;
            height: 800px;
            background-color: #0b0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
        }

        .card {
            background-color: #1a2233;
            color: white;

            width: 560px;

            padding: 55px 35px 25px 35px;

            border-radius: 32px;
            text-align: center;

            border: 2px solid #f6ad55;

            box-shadow: 0 10px 30px rgba(0,0,0,0.8);

            position: relative;
            margin-top: 50px;
        }

        .logo-frame {
            width: 130px;
            height: 130px;

            border-radius: 50%;
            border: 4px solid #f6ad55;

            margin: -115px auto 22px auto;

            background: #1a2233;

            padding: 4px;

            box-shadow: 0 0 20px rgba(246, 173, 85, 0.4);
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .header {
            color: #a0aec0;
            font-size: 16px;
            margin-bottom: 8px;
        }

        .title {
            font-size: 34px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #ffffff;
        }

        #status-box {
            padding: 12px 42px;
            border-radius: 30px;

            font-size: 17px;
            font-weight: bold;

            background-color: #f6ad55;
            color: #000;

            display: inline-block;

            margin-bottom: 30px;
        }

        .footer {
            background: #111827;

            padding: 22px;

            border-radius: 20px;

            display: flex;
            justify-content: space-between;

            direction: ltr;
        }

        .footer small {
            color: #a0aec0;
            font-size: 14px;
        }

        .footer span {
            font-size: 16px;
            font-weight: bold;
        }

        .value {
            color: #f6ad55;
            font-size: 30px;
            font-weight: bold;
            display: block;
        }
    </style>
</head>

<body>

    <div class="card">

        <div class="logo-frame">
            <img
                src="https://raw.githubusercontent.com/la-mudarra/rsi-bot-card/main/IMG_6035.PNG"
                alt="Logo"
                class="logo"
            >
        </div>

        <div class="header">
            بوت مؤشر لحظي
        </div>

        <div class="title">
            مؤشر سهم SPX
        </div>

        <div id="status-box">
            سوق مستقر
        </div>

        <div class="footer">

            <div style="text-align:right;direction:rtl;">
                <small>آخر تحديث</small>
                <br>

                <span id="date-value">
                    2026-05-30
                </span>

                <span id="time-value">
                    00:00
                </span>
            </div>

            <div style="text-align:right;direction:rtl;">
                <small>قيمة RSI</small>
                <br>

                <strong id="rsi-value" class="value">
                    50
                </strong>
            </div>

        </div>

    </div>

    <script>
        const params = new URLSearchParams(window.location.search);

        const rsi = parseFloat(
            params.get('rsi') || 50
        );

        document.getElementById('rsi-value').innerText = rsi;

        document.getElementById('date-value').innerText =
            params.get('date') || "2026-05-30";

        document.getElementById('time-value').innerText =
            params.get('time') || "00:00";

        const statusBox =
            document.getElementById('status-box');

        if (rsi > 70) {

            statusBox.style.backgroundColor = "#e53e3e";
            statusBox.style.color = "#ffffff";

            statusBox.innerText =
                "تشبع شرائي (بيع)";

        } else if (rsi < 30) {

            statusBox.style.backgroundColor = "#48bb78";
            statusBox.style.color = "#ffffff";

            statusBox.innerText =
                "فرصة شراء";
        }
    </script>

</body>
</html>
