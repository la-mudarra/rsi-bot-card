<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; background-color: #0b0e14; height: 100vh;
            display: flex; justify-content: center; align-items: center; 
            font-family: 'Cairo', sans-serif;
        }

        /* الكرت المستطيل العريض */
        .card { 
            background-color: #1a2233; color: white; padding: 50px 30px 20px 30px; 
            width: 500px; border-radius: 30px; text-align: center; 
            border: 2px solid #f6ad55; box-shadow: 0 10px 30px rgba(0,0,0,0.8); 
            position: relative; margin-top: 60px;
        }

        /* اللوجو البارز في المنتصف العلوي */
        .logo-frame {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid #f6ad55; margin: -110px auto 20px auto;
            background: #1a2233; padding: 4px; box-shadow: 0 0 20px rgba(246, 173, 85, 0.4);
        }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .header { color: #a0aec0; font-size: 14px; margin-bottom: 5px; }
        .title { font-size: 30px; font-weight: bold; margin-bottom: 25px; color: #ffffff; }
        
        #status-box { 
            padding: 12px 40px; border-radius: 30px; font-weight: bold; 
            background-color: #f6ad55; color: #000; display: inline-block; margin-bottom: 30px; 
        }

        .footer { 
            background: #111827; padding: 20px; border-radius: 20px; 
            display: flex; justify-content: space-between; direction: ltr;
        }
        .value { color: #f6ad55; font-size: 24px; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-frame">
            <img src="https://raw.githubusercontent.com/la-mudarra/rsi-bot-card/main/IMG_6035.PNG" alt="Logo" class="logo">
        </div>
        
        <div class="header">بوت مؤشر لحظي</div>
        <div class="title">مؤشر سهم SPX</div>
        
        <div id="status-box">سوق مستقر</div>
        
        <div class="footer">
            <div style="text-align: right; direction: rtl;">
                <small style="color: #a0aec0;">آخر تحديث</small><br>
                <span id="date-value" style="font-weight: bold;">2026-05-30</span> 
                <span id="time-value" style="font-weight: bold;">00:00</span>
            </div>
            <div style="text-align: right; direction: rtl;">
                <small style="color: #a0aec0;">قيمة RSI</small><br>
                <strong id="rsi-value" class="value">50</strong>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rsi = parseFloat(params.get('rsi') || 50);
        document.getElementById('rsi-value').innerText = rsi;
        document.getElementById('date-value').innerText = params.get('date') || "2026-05-30";
        document.getElementById('time-value').innerText = params.get('time') || "00:00";

        const statusBox = document.getElementById('status-box');
        if (rsi > 70) { statusBox.style.backgroundColor = "#e53e3e"; statusBox.innerText = "تشبع شرائي (بيع)"; }
        else if (rsi < 30) { statusBox.style.backgroundColor = "#48bb78"; statusBox.innerText = "فرصة شراء"; }
    </script>
</body>
</html>
