<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #0b0e14; display: flex; justify-content: center; align-items: center; font-family: sans-serif; height: 100vh; }
        
        /* كرت أفقي: عرض أكبر، ارتفاع أقل */
        .card { 
            background-color: #1a2233; color: white; padding: 20px; 
            width: 500px; height: 220px; border-radius: 20px; 
            border: 2px solid #f6ad55; box-shadow: 0 5px 20px rgba(0,0,0,0.5); 
            display: flex; align-items: center; position: relative;
        }

        /* الشعار على الجانب */
        .logo-frame {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid #f6ad55; background: #1a2233; 
            flex-shrink: 0; margin-left: 20px; overflow: hidden;
        }
        .logo { width: 100%; height: 100%; object-fit: cover; }

        .content { flex-grow: 1; text-align: right; }
        .title { font-size: 22px; font-weight: bold; margin-bottom: 10px; }
        
        #status-box { 
            padding: 5px 15px; border-radius: 15px; font-weight: bold; 
            background-color: #f6ad55; color: #000; display: inline-block; font-size: 14px;
        }

        .footer { 
            background: #111827; padding: 10px; border-radius: 15px; 
            display: flex; justify-content: space-around; margin-top: 15px; direction: ltr;
        }
        .value { color: #f6ad55; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-frame">
            <img src="https://raw.githubusercontent.com/la-mudarra/rsi-bot-card/main/IMG_6035.PNG" class="logo">
        </div>
        
        <div class="content">
            <div class="title">مؤشر سهم SPX</div>
            <div id="status-box">سوق مستقر</div>
            
            <div class="footer">
                <div style="text-align: center;">
                    <small style="color: #a0aec0; font-size: 10px;">آخر تحديث</small><br>
                    <span id="date-time" style="font-size: 12px;">2026-05-30 00:00</span>
                </div>
                <div style="text-align: center;">
                    <small style="color: #a0aec0; font-size: 10px;">قيمة RSI</small><br>
                    <strong id="rsi-value" class="value">50</strong>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
