```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    width:1080px;
    height:1080px;

    background-color:#0b0e14;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Cairo',sans-serif;

    overflow:hidden;
}

/* الكرت الرئيسي */
.card{
    width:900px;
    min-height:700px;

    background-color:#1a2233;
    color:white;

    padding:90px 60px 50px 60px;

    border-radius:50px;

    text-align:center;

    border:3px solid #f6ad55;

    box-shadow:0 20px 60px rgba(0,0,0,0.8);

    position:relative;

    margin-top:100px;
}

/* اللوجو */
.logo-frame{
    width:220px;
    height:220px;

    border-radius:50%;
    border:6px solid #f6ad55;

    margin:-190px auto 35px auto;

    background:#1a2233;

    padding:8px;

    box-shadow:0 0 35px rgba(246,173,85,0.4);
}

.logo{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

/* النصوص */
.header{
    color:#a0aec0;
    font-size:28px;
    margin-bottom:12px;
}

.title{
    font-size:58px;
    font-weight:bold;
    margin-bottom:40px;
    color:#ffffff;
    line-height:1.4;
}

/* حالة السوق */
#status-box{
    padding:20px 70px;

    border-radius:50px;

    font-size:34px;
    font-weight:bold;

    background-color:#f6ad55;
    color:#000;

    display:inline-block;

    margin-bottom:50px;
}

/* الفوتر */
.footer{
    background:#111827;

    padding:35px;

    border-radius:30px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    direction:ltr;
}

.footer small{
    color:#a0aec0;
    font-size:24px;
}

.footer span{
    font-size:28px;
    font-weight:bold;
}

.value{
    color:#f6ad55;
    font-size:54px;
    font-weight:bold;
    display:block;
}
</style>
</head>

<body>

<div class="card">

    <div class="logo-frame">
        <img
            src="https://raw.githubusercontent.com/la-mudarra/rsi-bot-card/main/IMG_6035.PNG"
            alt="Logo"
            class="logo"
        >
    </div>

    <div class="header">
        بوت مؤشر لحظي
    </div>

    <div class="title">
        مؤشر سهم SPX
    </div>

    <div id="status-box">
        سوق مستقر
    </div>

    <div class="footer">

        <div style="text-align:right;direction:rtl;">
            <small>آخر تحديث</small>
            <br>

            <span id="date-value">
                2026-05-30
            </span>

            <span id="time-value">
                00:00
            </span>
        </div>

        <div style="text-align:right;direction:rtl;">
            <small>قيمة RSI</small>
            <br>

            <strong id="rsi-value" class="value">
                50
            </strong>
        </div>

    </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);

const rsi = parseFloat(
    params.get('rsi') || 50
);

document.getElementById('rsi-value').innerText = rsi;

document.getElementById('date-value').innerText =
    params.get('date') || "2026-05-30";

document.getElementById('time-value').innerText =
    params.get('time') || "00:00";

const statusBox =
    document.getElementById('status-box');

if(rsi > 70){

    statusBox.style.backgroundColor = "#e53e3e";
    statusBox.style.color = "#ffffff";

    statusBox.innerText =
        "تشبع شرائي (بيع)";

}
else if(rsi < 30){

    statusBox.style.backgroundColor = "#48bb78";
    statusBox.style.color = "#ffffff";

    statusBox.innerText =
        "فرصة شراء";
}

</script>

</body>
</html>
```
