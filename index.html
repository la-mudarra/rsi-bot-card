<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            margin: 0; height: 100vh; background-color: #0b0e14; 
            display: flex; justify-content: center; align-items: center; font-family: 'Cairo', sans-serif;
        }
        
        /* الكرت المربع (سر نجاح المعاينة في تيليجرام) */
        .card { 
            background-color: #1a2233; color: white; padding: 20px; 
            width: 360px; height: 360px; border-radius: 30px; text-align: center; 
            border: 4px solid #f6ad55; /* الإطار الذهبي */
            box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        /* اللوجو داخل الكرت مباشرة */
        .logo-frame {
            width: 100px; height: 100px; border-radius: 50%;
            border: 3px solid #f6ad55; background: #0b0e14; padding: 3px;
            margin-bottom: 15px;
        }
        .logo { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .header { color: #a0aec0; font-size: 12px; margin-bottom: 5px; }
        .title { font-size: 22px; font-weight: bold; margin-bottom: 15px; }
        
        #status-box { 
            padding: 8px 25px; border-radius: 20px; font-weight: bold; 
            background-color: #f6ad55; color: #000; margin-bottom: 20px; 
        }

        .footer { 
            width: 100%; background: #111827; padding: 15px; border-radius: 20px; 
            display: flex; justify-content: space-around; box-sizing: border-box;
        }
        .value { color: #f6ad55; font-size: 18px; font-weight: bold; display: block; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-frame">
            <img src="https://raw.githubusercontent.com/la-mudarra/rsi-bot-card/main/IMG_6035.PNG" class="logo">
        </div>
        
        <div class="header">بوت مؤشر لحظي</div>
        <div class="title">مؤشر سهم SPX</div>
        
        <div id="status-box">سوق مستقر</div>
        
        <div class="footer">
            <div style="text-align: center;">
                <small style="color: #a0aec0;">آخر تحديث</small><br>
                <span id="date-value" style="font-weight: bold;">2026-05-30</span>
            </div>
            <div style="text-align: center;">
                <small style="color: #a0aec0;">قيمة RSI</small><br>
                <strong id="rsi-value" class="value">50</strong>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const rsi = parseFloat(params.get('rsi') || 50);
        document.getElementById('rsi-value').innerText = rsi;
        
        const statusBox = document.getElementById('status-box');
        if (rsi > 70) { statusBox.style.backgroundColor = "#e53e3e"; statusBox.innerText = "تشبع شرائي (بيع)"; }
        else if (rsi < 30) { statusBox.style.backgroundColor = "#48bb78"; statusBox.innerText = "فرصة شراء"; }
    </script>
</body>
</html>
