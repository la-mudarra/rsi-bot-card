```html
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            width: 800px;
            height: 800px;
            overflow: hidden;
            background-color: #0b0e14;
            font-family: 'Cairo', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* مساحة أمان تمنع قص اللوقو وحدود الكرت */
        .wrapper {
            width: 800px;
            height: 800px;

            display: flex;
            justify-content: center;
            align-items: center;

            padding-top: 80px;
            padding-bottom: 80px;
        }

        .card {
            background-color: #1a2233;
            color: white;

            width: 600px;

            border-radius: 40px;
            text-align: center;

            border: 3px solid #f6ad55;

            box-shadow:
                0 0 0 1px rgba(246, 173, 85, 0.15),
                0 10px 40px rgba(0, 0, 0, 0.55);

            position: relative;

            padding: 85px 35px 30px 35px;
        }

        /* الشعار البارز */
        .logo-frame {
            width: 120px;
            height: 120px;

            border-radius: 50%;
            border: 5px solid #f6ad55;

            background: #1a2233;

            padding: 4px;

            position: absolute;
            top: -60px;
            left: 50%;

            transform: translateX(-50%);

            box-shadow: 0 0 25px rgba(246, 173, 85, 0.45);
        }

        .logo {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .header {
            color: #a0aec0;
            font-size: 18px;
            margin-bottom: 12px;
        }

        .title {
            font-size: 38px;
            font-weight: bold;
            margin-bottom: 28px;
            color: #ffffff;
        }

        #status-box {
            padding: 12px 40px;

            border-radius: 30px;

            font-size: 22px;
            font-weight: bold;

            background-color: #f6ad55;
            color: #000;

            display: inline-block;

            margin-bottom: 35px;
        }

        .footer {
            background: #111827;

            padding: 25px;

            border-radius: 25px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            direction: ltr;
        }

        .footer small {
            color: #a0aec0;
            font-size: 14px;
        }

        .footer span {
            font-size: 18px;
            font-weight: bold;
        }

        .value {
            color: #f6ad55;
            font-size: 32px;
            font-weight: bold;
            display: block;
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <div class="card">

            <div class="logo-frame">
                <img
                    src="https://raw.githubusercontent.com/la-mudarra/rsi-bot-card/main/IMG_6035.PNG"
                    class="logo"
                    alt="Logo"
                >
            </div>

            <div class="header">بوت مؤشر لحظي</div>

            <div class="title">مؤشر سهم SPX</div>

            <div id="status-box">سوق مستقر</div>

            <div class="footer">

                <div style="text-align: right; direction: rtl;">
                    <small>آخر تحديث</small>
                    <br>
                    <span id="date-value">2026-05-30</span>
                    <span id="time-value">00:00</span>
                </div>

                <div style="text-align: right; direction: rtl;">
                    <small>قيمة RSI</small>
                    <br>
                    <strong id="rsi-value" class="value">50</strong>
                </div>

            </div>

        </div>

    </div>

    <script>
        // تحديث البيانات ديناميكياً
        const params = new URLSearchParams(window.location.search);

        const rsi = parseFloat(params.get('rsi') || 50);

        document.getElementById('rsi-value').innerText = rsi;

        document.getElementById('date-value').innerText =
            params.get('date') || "2026-05-30";

        document.getElementById('time-value').innerText =
            params.get('time') || "00:00";

        const statusBox = document.getElementById('status-box');

        if (rsi > 70) {
            statusBox.style.backgroundColor = "#e53e3e";
            statusBox.style.color = "#ffffff";
            statusBox.innerText = "تشبع شرائي (بيع)";
        } else if (rsi < 30) {
            statusBox.style.backgroundColor = "#48bb78";
            statusBox.style.color = "#ffffff";
            statusBox.innerText = "فرصة شراء";
        }
    </script>

</body>
</html>
